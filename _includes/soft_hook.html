<div class="py-4 my-2 text-center" id="soft-hook">
  <div class="container">
    <div class="row">
      <div class="col-lg-8 mx-auto">
        <div class="soft-hook-card">
          <h3 class="soft-hook-title mb-3">{{ include.title | default: "Ready to connect?" }}</h3>
          <p class="soft-hook-text mb-4">{{ include.text | default: "Every child is unique. If you're looking for personalized support or just have a few questions, feel free to reach out." }}</p>
          <a class="btn btn-primary text-uppercase px-4 py-2 font-weight-bold" style="border-radius: 30px; font-size: 0.85rem; letter-spacing: 1px;" href="{% if include.external %}{{ include.btn_link }}{% else %}{{ include.btn_link | default: '/contact/' | relative_url }}{% endif %}"{% if include.external %} target="_blank" rel="noopener noreferrer"{% endif %}>{{ include.btn_text | default: "Get in Touch" }}</a>
        </div>
      </div>
    </div>
  </div>
</div>
